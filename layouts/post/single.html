{{ partial "header.html" . }}
    <article class="post">
      <header>
        <h2><a class="post-title" href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
        <p class="post-subtitle">{{ .Date.Format "Monday, January 2, 2006" }} - {{ range .Params.tags }} <a href="/tags/{{ . | urlize }}">{{ . }}</a> {{ end }}</p>
      </header>
      <section>
        {{ .Content }}
      </section>
    </article>
    <div class="divider"></div>
{{ partial "license.html" . }}
{{ partial "footer.html" . }}
